<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IEEE Genesis</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .hero {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .hero-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .header {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 10;
      display: flex;
      justify-content: center;
      padding-top: 24px;
    }

    .home-btn {
      display: inline-block;
      transition: transform 0.2s ease;
    }

    .home-btn:hover {
      transform: scale(1.05);
    }

    .home-btn img {
      width: clamp(35px, 4vw, 55px);
      height: auto;
      display: block;
    }
  </style>
</head>
<body>
  <div class="hero">
    <img class="hero-bg" src="public/assets/background.png" alt="Hero Background">
    <header class="header">
      <a href="/" class="home-btn" aria-label="Home">
        <img src="public/assets/IEEE_sb_logo.png" alt="IEEE SB Logo">
      </a>
    </header>
  </div>
</body>
</html>
